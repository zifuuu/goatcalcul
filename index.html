<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GoatCalcul v11.0 | Dashboard Intégral</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --border: #27272a; --text: #fafafa; --primary: #3b82f6; --success: #22c55e; --orange: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid-main { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        input, select { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: white; width: 100%; margin-bottom: 12px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        .slider-container { background: #000; padding: 20px; border-radius: 12px; border: 1px solid var(--primary); margin-bottom: 20px; }
        .chart-container { height: 300px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        h3 { font-size: 14px; text-transform: uppercase; color: #a1a1aa; margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>GoatCalcul <span style="color:var(--primary)">v11.0</span></h1>
        <div style="text-align:right">
            <div style="color:gray; font-size:12px;">CAPITAL TOTAL</div>
            <div id="totalDisplay" style="font-size: 28px; font-weight: 800; color: var(--success);">0 €</div>
        </div>
    </div>

    <div class="grid-main">
        <aside>
            <div class="card">
                <h3>📥 Ajouter un Actif</h3>
                <input type="text" id="name" list="fonds-list" placeholder="Nom (ex: Iroko, MSCI World...)">
                <datalist id="fonds-list">
                    <option value="SCPI Remake Live"><option value="Iroko Zen"><option value="Amundi MSCI Water">
                    <option value="Amundi MSCI USA ESG"><option value="NextStage Croissance A"><option value="AXA Or">
                </datalist>

                <input type="number" id="amount" placeholder="Montant (€)">

                <label style="font-size:11px">CLASSE D'ACTIF</label>
                <select id="assetClass">
                    <option value="bourse">📈 Actions / ETF</option>
                    <option value="immo">🏠 Immobilier / SCPI</option>
                    <option value="pe">💼 Private Equity</option>
                    <option value="crypto">⛓️ Crypto / Blockchain</option>
                </select>

                <label style="font-size:11px">ZONE GÉOGRAPHIQUE</label>
                <select id="geoZone">
                    <option value="usa">États-Unis</option>
                    <option value="europe">Europe</option>
                    <option value="monde">Monde / Emergents</option>
                </select>

                <button class="btn" onclick="addAsset()">Ajouter au Portefeuille</button>
            </div>

            <div class="card" style="margin-top:20px;">
                <h3>📄 Mes Lignes</h3>
                <table id="portfolioTable">
                    <thead><tr><th>Fond</th><th>Montant</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
                <button onclick="clearAll()" style="width:100%; background:none; border:1px solid #444; color:gray; margin-top:15px; cursor:pointer; border-radius:4px; padding:5px;">Réinitialiser tout</button>
            </div>
        </aside>

        <main>
            <div class="slider-container">
                <label>⏱️ Horizon de projection : <b id="yearVal" style="color:var(--primary)">20</b> ans</label>
                <input type="range" id="yearSlider" min="5" max="50" step="5" value="20" oninput="updateYear(this.value)" style="width:100%; accent-color:var(--primary); margin-top:10px;">
            </div>

            <div class="card">
                <h3>📈 Simulation de Croissance (vs MSCI World 8%)</h3>
                <div class="chart-container"><canvas id="compareChart"></canvas></div>
            </div>

            <div class="grid-charts">
                <div class="card">
                    <h3>📊 Allocation par Type</h3>
                    <div class="chart-container"><canvas id="assetChart"></canvas></div>
                </div>
                <div class="card">
                    <h3>🌍 Répartition Géo</h3>
                    <div class="chart-container"><canvas id="geoChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    let assets = JSON.parse(localStorage.getItem('goatAssets')) || [];
    let charts = {};
    let horizon = 20;

    function save() {
        localStorage.setItem('goatAssets', JSON.stringify(assets));
        update();
    }

    function addAsset() {
        const name = document.getElementById('name').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const aClass = document.getElementById('assetClass').value;
        const gZone = document.getElementById('geoZone').value;

        if(!name || isNaN(amount)) return;
        assets.push({ name, amount, aClass, gZone });
        save();
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
    }

    function remove(i) { assets.splice(i, 1); save(); }
    function clearAll() { if(confirm("Supprimer toutes les données ?")) { assets = []; save(); } }
    function updateYear(v) { horizon = parseInt(v); document.getElementById('yearVal').innerText = v; update(); }

    function update() {
        let total = 0;
        let distClass = { bourse:0, immo:0, pe:0, crypto:0 };
        let distGeo = { usa:0, europe:0, monde:0 };
        const tbody = document.querySelector('#portfolioTable tbody');
        tbody.innerHTML = '';

        assets.forEach((a, i) => {
            total += a.amount;
            distClass[a.aClass] += a.amount;
            distGeo[a.gZone] += a.amount;
            tbody.innerHTML += `<tr><td>${a.name}</td><td>${a.amount.toLocaleString()}€</td><td><button onclick="remove(${i})" style="color:red; background:none; border:none; cursor:pointer;">✕</button></td></tr>`;
        });

        document.getElementById('totalDisplay').innerText = total.toLocaleString() + " €";
        renderCharts(total, distClass, distGeo);
    }

    function renderCharts(total, dClass, dGeo) {
        // --- 1. PROJECTION ---
        const ctxP = document.getElementById('compareChart').getContext('2d');
        if(charts.p) charts.p.destroy();
        let trajM = [total], trajW = [total], labs = ["An 0"];
        for(let y=1; y<=horizon; y++) {
            trajM.push(trajM[y-1] * 1.06); // Est. 6%
            trajW.push(trajW[y-1] * 1.08); // MSCI 8%
            labs.push("An " + y);
        }
        charts.p = new Chart(ctxP, {
            type: 'line',
            data: { labels: labs, datasets: [
                { label: 'Mon Portefeuille (6%)', data: trajM, borderColor: '#22c55e', tension: 0.2, pointRadius: 0 },
                { label: 'MSCI World (8%)', data: trajW, borderColor: '#3b82f6', borderDash:[5,5], tension: 0.2, pointRadius: 0 }
            ]},
            options: { maintainAspectRatio:false, plugins:{legend:{labels:{color:'#fff'}}}, scales:{y:{ticks:{color:'#888', callback:v=>v.toLocaleString()+'€'}, grid:{color:'#27272a'}}, x:{ticks:{color:'#888'}}} }
        });

        // --- 2. ASSETS ---
        const ctxA = document.getElementById('assetChart').getContext('2d');
        if(charts.a) charts.a.destroy();
        charts.a = new Chart(ctxA, {
            type: 'doughnut',
            data: { labels: ['Bourse', 'SCPI', 'PE', 'Crypto'], datasets: [{ data: [dClass.bourse, dClass.immo, dClass.pe, dClass.crypto], backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#a855f7'], borderWidth:0 }]},
            options: { maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{color:'#fff'}}} }
        });

        // --- 3. GEO ---
        const ctxG = document.getElementById('geoChart').getContext('2d');
        if(charts.g) charts.g.destroy();
        charts.g = new Chart(ctxG, {
            type: 'doughnut',
            data: { labels: ['USA', 'Europe', 'Monde'], datasets: [{ data: [dGeo.usa, dGeo.europe, dGeo.monde], backgroundColor: ['#3b82f6','#10b981','#6366f1'], borderWidth:0 }]},
            options: { maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{color:'#fff'}}} }
        });
    }

    update();
</script>
</body>
</html>
