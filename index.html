<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GoatCalcul v13.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --border: #27272a; --text: #fafafa; --primary: #3b82f6; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input, select { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: white; width: 100%; margin-bottom: 15px; box-sizing: border-box; border: 1px solid var(--border); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .chart-container { height: 300px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .benchmark-zone { border-top: 1px solid var(--border); margin-top: 20px; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>GoatCalcul <span style="color:var(--primary)">v13</span></h1>
        <div id="totalDisplay" style="font-size:28px; font-weight:800; color:var(--success);">0 €</div>
    </header>

    <div class="grid">
        <aside>
            <div class="card">
                <h3>📥 Ajouter un Fond</h3>
                
                <input type="text" id="fn" list="dl" placeholder="Nom du fond (ex: Amundi)">
                <datalist id="dl">
                    <option value="SCPI Remake Live">
                    <option value="Iroko Zen">
                    <option value="AMUNDI MSCI USA ESG">
                    <option value="Amundi MSCI Water">
                    <option value="AXA Or et Matières Premières">
                    <option value="NextStage Croissance">
                </datalist>

                <input type="number" id="fa" placeholder="Montant (€)">

                <select id="ft">
                    <option value="Bourse">📈 Bourse</option>
                    <option value="Immo">🏠 SCPI / Immo</option>
                    <option value="PE">💼 Private Equity</option>
                </select>

                <select id="fg">
                    <option value="USA">États-Unis</option>
                    <option value="Europe">Europe</option>
                    <option value="Monde">Monde / Asie</option>
                </select>

                <button class="btn" onclick="add()">Ajouter</button>

                <div class="benchmark-zone">
                    <p style="font-size:11px; color:gray;">COMPARAISON :</p>
                    <button onclick="setB('MSCI World', 0.08)" style="width:100%; margin-bottom:5px; cursor:pointer;">🆚 MSCI World (8%)</button>
                    <button onclick="setB('S&P 500', 0.10)" style="width:100%; cursor:pointer;">🆚 S&P 500 (10%)</button>
                </div>
            </div>

            <div class="card">
                <table id="tab"><tbody></tbody></table>
            </div>
        </aside>

        <main>
            <div class="card">
                <label>Projection : <b id="yV">20</b> ans</label>
                <input type="range" id="yS" min="5" max="50" step="5" value="20" oninput="uY(this.value)" style="width:100%;">
            </div>

            <div class="card">
                <div class="chart-container"><canvas id="cP"></canvas></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card">
                    <h3>Allocation Actifs</h3>
                    <div class="chart-container"><canvas id="cA"></canvas></div>
                </div>
                <div class="card">
                    <h3>Répartition Géo</h3>
                    <div class="chart-container"><canvas id="cG"></canvas></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('gAssets')) || [];
    let horizon = 20;
    let bMark = { n: 'MSCI World', r: 0.08 };
    let c = {};

    function add() {
        const n = document.getElementById('fn').value;
        const a = parseFloat(document.getElementById('fa').value);
        const t = document.getElementById('ft').value;
        const g = document.getElementById('fg').value;
        if(!n || !a) return;
        data.push({n, a, t, g});
        save();
    }

    function save() {
        localStorage.setItem('gAssets', JSON.stringify(data));
        render();
    }

    function uY(v) { horizon = parseInt(v); document.getElementById('yV').innerText = v; render(); }
    function setB(n, r) { bMark = {n, r}; render(); }
    function del(i) { data.splice(i, 1); save(); }

    function render() {
        let tot = 0;
        let dT = {}, dG = {};
        const tb = document.querySelector('#tab tbody');
        tb.innerHTML = '';

        data.forEach((item, i) => {
            tot += item.a;
            dT[item.t] = (dT[item.t] || 0) + item.a;
            dG[item.g] = (dG[item.g] || 0) + item.a;
            tb.innerHTML += `<tr><td>${item.n}</td><td>${item.a.toLocaleString()}€</td><td onclick="del(${i})" style="color:red; cursor:pointer;">✕</td></tr>`;
        });
        document.getElementById('totalDisplay').innerText = tot.toLocaleString() + " €";

        // Graphique Projection
        if(c.p) c.p.destroy();
        let tM = [tot], tB = [tot], lbs = ["An 0"];
        for(let y=1; y<=horizon; y++) {
            tM.push(tM[y-1]*1.06); tB.push(tB[y-1]*(1+bMark.r));
            lbs.push("An "+y);
        }
        c.p = new Chart(document.getElementById('cP'), {
            type: 'line',
            data: { labels: lbs, datasets: [
                { label: 'Mon PF (6%)', data: tM, borderColor: '#22c55e' },
                { label: bMark.n, data: tB, borderColor: '#3b82f6', borderDash: [5,5] }
            ]},
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
        });

        // Graphique Actifs
        if(c.a) c.a.destroy();
        c.a = new Chart(document.getElementById('cA'), {
            type: 'doughnut',
            data: { labels: Object.keys(dT), datasets: [{ data: Object.values(dT), backgroundColor: ['#3b82f6','#22c55e','#f59e0b'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        // Graphique Géo (FORÇAGE DES LÉGENDES)
        if(c.g) c.g.destroy();
        c.g = new Chart(document.getElementById('cG'), {
            type: 'doughnut',
            data: { labels: Object.keys(dG), datasets: [{ data: Object.values(dG), backgroundColor: ['#3b82f6','#10b981','#6366f1'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom', labels: { color: '#fff' } } } }
        });
    }
    render();
</script>
</body>
</html>
