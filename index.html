<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GoatCalcul v15.0 | Dashboard Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --border: #27272a; --text: #fafafa; --primary: #3b82f6; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        input, select { background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: white; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        .btn-bench { background: #27272a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; width: 48%; font-size: 11px; margin-bottom: 10px; }
        .chart-container { height: 300px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .delete-btn { color: #ff4444; cursor: pointer; font-weight: bold; font-size: 18px; text-align: center; width: 30px; }
        h3 { font-size: 14px; text-transform: uppercase; color: #a1a1aa; margin-top: 0; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:1px solid var(--border); padding-bottom:15px;">
        <h1 style="margin:0;">GoatCalcul <span style="color:var(--primary)">v15</span></h1>
        <div style="text-align:right">
            <div style="color:gray; font-size:12px;">VALEUR DU PORTEFEUILLE</div>
            <div id="totalDisplay" style="font-size: 32px; font-weight: 800; color: var(--success);">0 €</div>
        </div>
    </header>

    <div class="grid">
        <aside>
            <div class="card">
                <h3>📥 Ajouter un Actif</h3>
                <label style="font-size:11px; color:gray;">NOM DU FONDS (Auto-complétion)</label>
                <input type="text" id="nomFonds" list="suggestions" placeholder="Ex: Amundi, Iroko...">
                <datalist id="suggestions">
                    <option value="SCPI Remake Live"><option value="Iroko Zen">
                    <option value="AMUNDI MSCI USA ESG LEADERS"><option value="AMUNDI INDEX MSCI EMU SRI PAB">
                    <option value="Amundi MSCI Water ESG"><option value="LYXOR ETF NEW ENERGY">
                    <option value="Amundi MSCI Em Mkt Swap II"><option value="AXA Or et Matières Premières">
                    <option value="R-co Thematic Blockchain"><option value="NextStage Croissance A">
                </datalist>

                <input type="number" id="montantFonds" placeholder="Montant (€)">

                <select id="typeFonds">
                    <option value="Bourse">📈 Actions / ETF</option>
                    <option value="Immo">🏠 SCPI / Immo</option>
                    <option value="Private Equity">💼 Private Equity</option>
                    <option value="Crypto">⛓️ Crypto / Blockchain</option>
                </select>

                <select id="geoFonds">
                    <option value="USA">🇺🇸 États-Unis</option>
                    <option value="Europe">🇪🇺 Europe</option>
                    <option value="Monde">🌍 Monde / Emergents</option>
                    <option value="Asie">🌏 Asie</option>
                </select>

                <button class="btn-add" onclick="ajouterActif()">Ajouter</button>

                <div style="margin-top:25px; padding-top:15px; border-top:1px solid #333;">
                    <h3>🆚 Comparaison</h3>
                    <div style="display:flex; justify-content:space-between;">
                        <button class="btn-bench" onclick="changerBench('MSCI World', 0.08)">MSCI World (8%)</button>
                        <button class="btn-bench" onclick="changerBench('S&P 500', 0.10)">S&P 500 (10%)</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>📄 Mon Portefeuille</h3>
                <table id="tablePortefeuille"><tbody></tbody></table>
                <button onclick="viderTout()" style="width:100%; background:none; border:1px solid #444; color:gray; margin-top:15px; cursor:pointer; padding:8px; border-radius:6px; font-size:11px;">Tout effacer</button>
            </div>
        </aside>

        <main>
            <div class="card">
                <label>⏱️ Horizon de projection : <b id="valHorizon" style="color:var(--primary)">20</b> ans</label>
                <input type="range" id="sliderHorizon" min="5" max="50" step="5" value="20" oninput="majHorizon(this.value)" style="width:100%; margin-top:15px; accent-color:var(--primary);">
                <div class="chart-container" style="margin-top:20px;"><canvas id="chartProjection"></canvas></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card">
                    <h3>📊 Allocation par Type</h3>
                    <div class="chart-container"><canvas id="chartType"></canvas></div>
                </div>
                <div class="card">
                    <h3>🌍 Répartition Géo</h3>
                    <div class="chart-container"><canvas id="chartGeo"></canvas></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    let monPF = JSON.parse(localStorage.getItem('goat_v15_data')) || [];
    let duree = 20;
    let benchmark = { nom: 'MSCI World', taux: 0.08 };
    let mesGraphs = {};

    function ajouterActif() {
        const n = document.getElementById('nomFonds').value;
        const m = parseFloat(document.getElementById('montantFonds').value);
        const t = document.getElementById('typeFonds').value;
        const g = document.getElementById('geoFonds').value;
        
        if(!n || isNaN(m)) return;
        monPF.push({ n, m, t, g });
        sauvegarder();
        document.getElementById('nomFonds').value = '';
        document.getElementById('montantFonds').value = '';
    }

    function sauvegarder() {
        localStorage.setItem('goat_v15_data', JSON.stringify(monPF));
        actualiserInterface();
    }

    function supprimerLigne(i) { monPF.splice(i, 1); sauvegarder(); }
    function viderTout() { if(confirm("Vider tout le portefeuille ?")) { monPF = []; sauvegarder(); } }
    function majHorizon(v) { duree = parseInt(v); document.getElementById('valHorizon').innerText = v; actualiserInterface(); }
    function changerBench(n, r) { benchmark = { nom: n, taux: r }; actualiserInterface(); }

    function actualiserInterface() {
        let total = 0;
        let repartType = {};
        let repartGeo = {};
        const tbody = document.querySelector('#tablePortefeuille tbody');
        tbody.innerHTML = '';

        monPF.forEach((actif, i) => {
            total += actif.m;
            repartType[actif.t] = (repartType[actif.t] || 0) + actif.m;
            repartGeo[actif.g] = (repartGeo[actif.g] || 0) + actif.m;
            tbody.innerHTML += `<tr><td>${actif.n}</td><td style="font-weight:bold;">${actif.m.toLocaleString()}€</td><td class="delete-btn" onclick="supprimerLigne(${i})">✕</td></tr>`;
        });

        document.getElementById('totalDisplay').innerText = total.toLocaleString() + " €";
        dessinerGraphs(total, repartType, repartGeo);
    }

    function dessinerGraphs(total, rType, rGeo) {
        // --- PROJECTION ---
        const ctxP = document.getElementById('chartProjection').getContext('2d');
        if(mesGraphs.p) mesGraphs.p.destroy();
        let monEvolution = [total], benchEvolution = [total], labelsX = ["An 0"];
        for(let y=1; y<=duree; y++){
            monEvolution.push(monEvolution[y-1] * 1.06); 
            benchEvolution.push(benchEvolution[y-1] * (1 + benchmark.taux));
            labelsX.push("An " + y);
        }
        mesGraphs.p = new Chart(ctxP, {
            type: 'line',
            data: { labels: labelsX, datasets: [
                { label: 'Mon Portefeuille (6%)', data: monEvolution, borderColor: '#22c55e', tension: 0.3, pointRadius: 0 },
                { label: benchmark.nom + ' (' + (benchmark.taux*100) + '%)', data: benchEvolution, borderColor: '#3b82f6', borderDash: [5, 5], tension: 0.3, pointRadius: 0 }
            ]},
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#888' }, grid: { color: '#27272a' } }, x: { ticks: { color: '#888' } } } }
        });

        // --- TYPE ---
        const ctxT = document.getElementById('chartType').getContext('2d');
        if(mesGraphs.t) mesGraphs.t.destroy();
        mesGraphs.t = new Chart(ctxT, {
            type: 'doughnut',
            data: { labels: Object.keys(rType), datasets: [{ data: Object.values(rType), backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#a855f7'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', padding: 20 } } } }
        });

        // --- GEO (Correction Légendes) ---
        const ctxG = document.getElementById('chartGeo').getContext('2d');
        if(mesGraphs.g) mesGraphs.g.destroy();
        mesGraphs.g = new Chart(ctxG, {
            type: 'doughnut',
            data: { labels: Object.keys(rGeo), datasets: [{ data: Object.values(rGeo), backgroundColor: ['#3b82f6','#10b981','#6366f1','#f43f5e'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', padding: 20 } } } }
        });
    }

    actualiserInterface();
</script>
</body>
</html>
